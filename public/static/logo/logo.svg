<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
    <defs>
        <!-- 背景渐变 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B1622" />
            <stop offset="100%" stop-color="#1A3650" />
        </linearGradient>

        <!-- 顶层纸张渐变 (明亮白/青色) -->
        <linearGradient id="l3-left" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#C0F0FA" />
        </linearGradient>
        <linearGradient id="l3-right" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ADD8" />
            <stop offset="100%" stop-color="#0082A3" />
        </linearGradient>

        <!-- 中层纸张渐变 (Go标准蓝) -->
        <linearGradient id="l2-left" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ADD8" />
            <stop offset="100%" stop-color="#007299" />
        </linearGradient>
        <linearGradient id="l2-right" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0099C2" />
            <stop offset="100%" stop-color="#00668A" />
        </linearGradient>

        <!-- 底层纸张渐变 (深邃蓝) -->
        <linearGradient id="l1-left" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#004B66" />
            <stop offset="100%" stop-color="#001D2B" />
        </linearGradient>
        <linearGradient id="l1-right" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00668A" />
            <stop offset="100%" stop-color="#002633" />
        </linearGradient>

        <!-- 纸张阴影效果 (塑造层叠感) -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.35" />
        </filter>

        <!-- 发光效果 -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- 背景圆角矩形 -->
    <rect x="10" y="10" width="480" height="480" rx="90" fill="url(#bgGrad)" />

    <!-- === 图标主体 (Icon) === -->
    <g transform="translate(0, -10)">

        <!-- 底层纸张 (Layer 1) -->
        <g filter="url(#shadow)">
            <path d="M 130 210 Q 190 170, 250 220 L 250 280 Q 190 230, 130 270 Z" fill="url(#l1-left)" />
            <path d="M 370 210 Q 310 170, 250 220 L 250 280 Q 310 230, 370 270 Z" fill="url(#l1-right)" />
        </g>

        <!-- 中层纸张 (Layer 2) -->
        <g filter="url(#shadow)">
            <path d="M 130 190 Q 190 150, 250 200 L 250 260 Q 190 210, 130 250 Z" fill="url(#l2-left)" />
            <path d="M 370 190 Q 310 150, 250 200 L 250 260 Q 310 210, 370 250 Z" fill="url(#l2-right)" />
        </g>

        <!-- 顶层纸张 (Layer 3) -->
        <g filter="url(#shadow)">
            <path d="M 130 170 Q 190 130, 250 180 L 250 240 Q 190 190, 130 230 Z" fill="url(#l3-left)" />
            <path d="M 370 170 Q 310 130, 250 180 L 250 240 Q 310 190, 370 230 Z" fill="url(#l3-right)" />
        </g>

        <!-- 书脊/Go并发节点特征 (Spine & Go Traits) -->
        <g filter="url(#glow)">
            <!-- 致敬 Go Logo 的三根平行线 -->
            <line x1="238" y1="160" x2="238" y2="265" stroke="#00ADD8" stroke-width="3" stroke-linecap="round" />
            <line x1="262" y1="160" x2="262" y2="265" stroke="#00ADD8" stroke-width="3" stroke-linecap="round" />
            <line x1="250" y1="145" x2="250" y2="285" stroke="#00E5FF" stroke-width="4" stroke-linecap="round" />

            <!-- 致敬 Go Gopher 的迷你发光点 (眼睛) -->
            <circle cx="238" cy="155" r="2.5" fill="#FFFFFF" />
            <circle cx="262" cy="155" r="2.5" fill="#FFFFFF" />
        </g>
    </g>

    <!-- === 文本排版 (Typography) === -->
    <!-- 主标题: 纸间 -->
    <text x="250" y="380"
          font-family="STSong, 'Songti SC', 'Noto Serif CJK SC', 'Microsoft YaHei', serif"
          font-size="44"
          font-weight="bold"
          fill="#FFFFFF"
          text-anchor="middle"
          letter-spacing="14">纸间</text>

    <!-- 副标题: 英文及系统属性说明 -->
    <text x="250" y="420"
          font-family="system-ui, -apple-system, 'Inter', sans-serif"
          font-size="14"
          font-weight="600"
          fill="#00ADD8"
          text-anchor="middle"
          letter-spacing="5">ZJIAN SYSTEM</text>

</svg>