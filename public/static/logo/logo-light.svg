<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
    <defs>
        <!-- 浅色背景渐变 (非常柔和的灰蓝色) -->
        <linearGradient id="bgGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F4F8FA" />
            <stop offset="100%" stop-color="#E1EAED" />
        </linearGradient>

        <!-- 顶层纸张 (纯净白 / 亮Go蓝) -->
        <linearGradient id="l3-left-light" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#E6F5FA" />
        </linearGradient>
        <linearGradient id="l3-right-light" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ADD8" />
            <stop offset="100%" stop-color="#0092B8" />
        </linearGradient>

        <!-- 中层纸张 (淡青色 / Go蓝) -->
        <linearGradient id="l2-left-light" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C7EEFA" />
            <stop offset="100%" stop-color="#9EE0F5" />
        </linearGradient>
        <linearGradient id="l2-right-light" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#008EB3" />
            <stop offset="100%" stop-color="#007299" />
        </linearGradient>

        <!-- 底层纸张 (水蓝色 / 深Go蓝) -->
        <linearGradient id="l1-left-light" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#9EE0F5" />
            <stop offset="100%" stop-color="#72D1F0" />
        </linearGradient>
        <linearGradient id="l1-right-light" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#007299" />
            <stop offset="100%" stop-color="#005775" />
        </linearGradient>

        <!-- 浅色模式柔和阴影 (低透明度的深蓝阴影，更显干净) -->
        <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#001D33" flood-opacity="0.12" />
        </filter>
    </defs>

    <!-- 背景圆角矩形 -->
    <rect x="10" y="10" width="480" height="480" rx="90" fill="url(#bgGradLight)" />

    <g>
        <!-- 底层 -->
        <g filter="url(#shadowLight)">
            <path d="M 58 254 Q 154 190, 250 270 L 250 366 Q 154 286, 58 350 Z" fill="url(#l1-left-light)" />
            <path d="M 442 254 Q 346 190, 250 270 L 250 366 Q 346 286, 442 350 Z" fill="url(#l1-right-light)" />
        </g>
        <!-- 中层 -->
        <g filter="url(#shadowLight)">
            <path d="M 58 222 Q 154 158, 250 238 L 250 334 Q 154 254, 58 318 Z" fill="url(#l2-left-light)" />
            <path d="M 442 222 Q 346 158, 250 238 L 250 334 Q 346 254, 442 318 Z" fill="url(#l2-right-light)" />
        </g>
        <!-- 顶层 -->
        <g filter="url(#shadowLight)">
            <path d="M 58 190 Q 154 126, 250 206 L 250 302 Q 154 222, 58 286 Z" fill="url(#l3-left-light)" />
            <path d="M 442 190 Q 346 126, 250 206 L 250 302 Q 346 222, 442 286 Z" fill="url(#l3-right-light)" />
        </g>

        <!-- 书脊/Go特征 (浅色模式下去除了外发光，改为实色高对比线条) -->
        <g>
            <!-- 两侧线条使用深蓝色以保证在浅色书页上的清晰度 -->
            <line x1="231" y1="174" x2="231" y2="342" stroke="#00668A" stroke-width="5" stroke-linecap="round" />
            <line x1="269" y1="174" x2="269" y2="342" stroke="#00668A" stroke-width="5" stroke-linecap="round" />
            <!-- 中间主线保留标准的Go蓝色 -->
            <line x1="250" y1="150" x2="250" y2="374" stroke="#00ADD8" stroke-width="6.5" stroke-linecap="round" />

            <!-- Gopher点睛之笔：使用Go蓝色 -->
            <circle cx="231" cy="166" r="4" fill="#00ADD8" />
            <circle cx="269" cy="166" r="4" fill="#00ADD8" />
        </g>
    </g>
</svg>