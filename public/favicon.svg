<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
    <defs>
        <!-- 深色背景渐变 -->
        <linearGradient id="bgGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B1622" />
            <stop offset="100%" stop-color="#1A3650" />
        </linearGradient>

        <linearGradient id="l3-left-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#C0F0FA" />
        </linearGradient>
        <linearGradient id="l3-right-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ADD8" />
            <stop offset="100%" stop-color="#0082A3" />
        </linearGradient>

        <linearGradient id="l2-left-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ADD8" />
            <stop offset="100%" stop-color="#007299" />
        </linearGradient>
        <linearGradient id="l2-right-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0099C2" />
            <stop offset="100%" stop-color="#00668A" />
        </linearGradient>

        <linearGradient id="l1-left-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#004B66" />
            <stop offset="100%" stop-color="#001D2B" />
        </linearGradient>
        <linearGradient id="l1-right-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00668A" />
            <stop offset="100%" stop-color="#002633" />
        </linearGradient>

        <!-- 深色模式高对比度阴影 -->
        <filter id="shadowDark" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.45" />
        </filter>

        <!-- 霓虹发光效果 -->
        <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- 背景圆角矩形 -->
    <rect x="10" y="10" width="480" height="480" rx="90" fill="url(#bgGradDark)" />

    <g>
        <!-- 底层 -->
        <g filter="url(#shadowDark)">
            <path d="M 58 254 Q 154 190, 250 270 L 250 366 Q 154 286, 58 350 Z" fill="url(#l1-left-dark)" />
            <path d="M 442 254 Q 346 190, 250 270 L 250 366 Q 346 286, 442 350 Z" fill="url(#l1-right-dark)" />
        </g>
        <!-- 中层 -->
        <g filter="url(#shadowDark)">
            <path d="M 58 222 Q 154 158, 250 238 L 250 334 Q 154 254, 58 318 Z" fill="url(#l2-left-dark)" />
            <path d="M 442 222 Q 346 158, 250 238 L 250 334 Q 346 254, 442 318 Z" fill="url(#l2-right-dark)" />
        </g>
        <!-- 顶层 -->
        <g filter="url(#shadowDark)">
            <path d="M 58 190 Q 154 126, 250 206 L 250 302 Q 154 222, 58 286 Z" fill="url(#l3-left-dark)" />
            <path d="M 442 190 Q 346 126, 250 206 L 250 302 Q 346 222, 442 286 Z" fill="url(#l3-right-dark)" />
        </g>
        <!-- 发光书脊/Go特征 -->
        <g filter="url(#glowDark)">
            <line x1="231" y1="174" x2="231" y2="342" stroke="#00ADD8" stroke-width="5" stroke-linecap="round" />
            <line x1="269" y1="174" x2="269" y2="342" stroke="#00ADD8" stroke-width="5" stroke-linecap="round" />
            <line x1="250" y1="150" x2="250" y2="374" stroke="#00E5FF" stroke-width="6.5" stroke-linecap="round" />
            <circle cx="231" cy="166" r="4" fill="#FFFFFF" />
            <circle cx="269" cy="166" r="4" fill="#FFFFFF" />
        </g>
    </g>
</svg>