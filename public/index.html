<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoSeed · 欢迎</title>
    <style>
      /* =========================================
         1. 亮色主题变量 (默认)
         ========================================= */
      :root {
        /* 基础色 */
        --color-bg: #f8fafc;
        --color-text-main: #0f172a;
        --color-text-muted: #64748b;
        --color-success: #10b981;

        /* 容器与面板 */
        --color-panel: rgba(255, 255, 255, 0.75);
        --color-strip: rgba(255, 255, 255, 0.5);
        --color-tag: #f1f5f9;
        --color-logo-bg: #ffffff;
        --color-pill: #ffffff;
        --color-pill-hover: #ffffff;

        /* 品牌蓝与强调色 */
        --color-primary-text: #0284c7;
        --color-primary-bg: rgba(14, 165, 233, 0.1);
        --color-primary-border: rgba(14, 165, 233, 0.2);

        /* 边框 */
        --color-border: rgba(226, 232, 240, 0.8);
        --color-tag-border: rgba(0, 0, 0, 0.03);
        --color-logo-border: rgba(0, 0, 0, 0.05);
        --color-pill-border-hover: rgba(14, 165, 233, 0.3);

        /* 文本特殊效果 */
        --color-headline-start: #0f172a;
        --color-headline-end: #334155;
        --color-pill-text: #334155;
        --color-footer-closing: #94a3b8;

        /* 氛围光与网格 */
        --color-grid: rgba(15, 23, 42, 0.03);
        --color-glow-1: rgba(14, 165, 233, 0.12);
        --color-glow-2: rgba(56, 189, 248, 0.12);
        --color-success-glow: rgba(16, 185, 129, 0.4);
        --color-success-glow-end: rgba(16, 185, 129, 0);

        /* 阴影与高光 */
        --highlight-panel: inset 0 1px 0 rgba(255, 255, 255, 1);
        --shadow-panel:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 20px 40px -10px rgba(14, 165, 233, 0.1);
        --shadow-panel-hover:
          0 6px 12px -2px rgba(0, 0, 0, 0.05),
          0 30px 50px -15px rgba(14, 165, 233, 0.15);
        --shadow-logo: 0 2px 4px rgba(0, 0, 0, 0.04);
        --shadow-pill: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-pill-hover: 0 4px 12px rgba(14, 165, 233, 0.08);

        /* Logo反色（亮色模式不需要反色） */
        --logo-filter: none;
      }

      /* =========================================
         2. 暗黑主题变量 (通过 [data-theme="dark"] 触发)
         ========================================= */
      [data-theme="dark"] {
        /* 基础色 */
        --color-bg: #090e17;
        --color-text-main: #f8fafc;
        --color-text-muted: #94a3b8;
        --color-success: #34d399;

        /* 容器与面板 */
        --color-panel: rgba(30, 41, 59, 0.65);
        --color-strip: rgba(15, 23, 42, 0.4);
        --color-tag: rgba(255, 255, 255, 0.06);
        --color-logo-bg: #1e293b;
        --color-pill: rgba(15, 23, 42, 0.6);
        --color-pill-hover: rgba(15, 23, 42, 0.8);

        /* 品牌蓝与强调色 */
        --color-primary-text: #7dd3fc;
        --color-primary-bg: rgba(56, 189, 248, 0.1);
        --color-primary-border: rgba(56, 189, 248, 0.2);

        /* 边框 */
        --color-border: rgba(255, 255, 255, 0.08);
        --color-tag-border: rgba(255, 255, 255, 0.05);
        --color-logo-border: rgba(255, 255, 255, 0.05);
        --color-pill-border-hover: rgba(56, 189, 248, 0.4);

        /* 文本特殊效果 */
        --color-headline-start: #ffffff;
        --color-headline-end: #94a3b8;
        --color-pill-text: #e2e8f0;
        --color-footer-closing: #64748b;

        /* 氛围光与网格 */
        --color-grid: rgba(255, 255, 255, 0.025);
        --color-glow-1: rgba(14, 165, 233, 0.15);
        --color-glow-2: rgba(56, 189, 248, 0.15);
        --color-success-glow: rgba(52, 211, 153, 0.4);
        --color-success-glow-end: rgba(52, 211, 153, 0);

        /* 阴影与高光 */
        --highlight-panel: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        --shadow-panel:
          0 4px 6px -1px rgba(0, 0, 0, 0.3),
          0 20px 40px -10px rgba(0, 0, 0, 0.5);
        --shadow-panel-hover:
          0 6px 12px -2px rgba(0, 0, 0, 0.4),
          0 30px 50px -15px rgba(0, 0, 0, 0.6),
          0 0 40px -10px rgba(14, 165, 233, 0.15);
        --shadow-logo: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        --shadow-pill: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        --shadow-pill-hover:
          0 4px 12px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);

        /* 如果您的原版Logo是纯黑色，在暗色模式下翻转为白色 */
        --logo-filter: invert(1);
      }

      /* =========================================
         3. Base Elements (应用变量)
         ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--color-bg);
        background-image:
          radial-gradient(at 15% 50%, var(--color-glow-1) 0px, transparent 50%),
          radial-gradient(at 85% 30%, var(--color-glow-2) 0px, transparent 50%),
          linear-gradient(to right, var(--color-grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--color-grid) 1px, transparent 1px);
        background-size:
          100% 100%,
          100% 100%,
          32px 32px,
          32px 32px;
        background-attachment: fixed;

        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        color: var(--color-text-main);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;

        /* 增加颜色过渡动画，使切换主题更柔和 */
        transition:
          background-color 0.4s ease,
          color 0.4s ease;
      }

      /* =========================================
         4. Animations
         ========================================= */
      @keyframes fadeUp {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulseDot {
        0% {
          box-shadow: 0 0 0 0 var(--color-success-glow);
        }
        70% {
          box-shadow: 0 0 0 8px var(--color-success-glow-end);
        }
        100% {
          box-shadow: 0 0 0 0 var(--color-success-glow-end);
        }
      }

      /* =========================================
         5. Card Container
         ========================================= */
      .welcome-panel {
        max-width: 680px;
        width: 100%;
        background: var(--color-panel);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: 24px;
        box-shadow: var(--shadow-panel), var(--highlight-panel);
        border: 1px solid var(--color-border);
        overflow: hidden;
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;

        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease,
          background-color 0.4s ease,
          border-color 0.4s ease;
      }

      .welcome-panel:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-panel-hover), var(--highlight-panel);
      }

      /* =========================================
         6. Header Strip
         ========================================= */
      .top-strip {
        border-bottom: 1px solid var(--color-border);
        padding: 1rem 1.8rem;
        display: flex;
        align-items: center;
        gap: 0.8rem;
        background: var(--color-strip);
        transition:
          background-color 0.4s ease,
          border-color 0.4s ease;
      }

      .logo-box {
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--color-logo-bg);
        border-radius: 10px;
        width: 36px;
        height: 36px;
        box-shadow: var(--shadow-logo);
        border: 1px solid var(--color-logo-border);
        transition:
          background-color 0.4s ease,
          border-color 0.4s ease;
      }

      .logo-box img {
        width: 20px;
        height: 20px;
        filter: var(--logo-filter);
        transition: filter 0.4s ease;
      }

      .brand-name {
        font-weight: 600;
        font-size: 1.1rem;
        letter-spacing: -0.01em;
      }

      .strip-tag {
        background: var(--color-tag);
        color: var(--color-text-muted);
        border-radius: 6px;
        padding: 0.2rem 0.6rem;
        margin-left: auto;
        font-size: 0.8rem;
        font-weight: 500;
        border: 1px solid var(--color-tag-border);
        transition:
          background-color 0.4s,
          color 0.4s,
          border-color 0.4s;
      }

      /* 主题切换按钮 */
      .theme-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.3rem;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-muted);
        border-radius: 6px;
        transition:
          transform 0.3s ease,
          color 0.3s ease,
          background-color 0.3s ease;
      }

      .theme-btn:hover {
        color: var(--color-text-main);
        transform: rotate(15deg) scale(1.1);
      }

      /* =========================================
         7. Main Content
         ========================================= */
      .greeting-content {
        padding: 4rem 3rem;
        text-align: center;
      }

      .project-headline {
        font-size: 3.8rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(
          135deg,
          var(--color-headline-start) 0%,
          var(--color-headline-end) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 1.5rem;
        line-height: 1.1;
      }

      .welcome-message {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 1.1rem;
        color: var(--color-primary-text);
        background: var(--color-primary-bg);
        padding: 0.6rem 1.5rem;
        border-radius: 100px;
        font-weight: 500;
        margin-bottom: 1.5rem;
        border: 1px solid var(--color-primary-border);
        transition:
          background-color 0.4s,
          border-color 0.4s,
          color 0.4s;
      }

      .sub-desc {
        font-size: 1.15rem;
        color: var(--color-text-muted);
        max-width: 480px;
        margin: 0 auto 2.5rem auto;
        transition: color 0.4s;
      }

      /* =========================================
         8. Features Pills
         ========================================= */
      .simple-desc {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 3rem;
      }

      .pill {
        background: var(--color-pill);
        border-radius: 12px;
        padding: 0.6rem 1.2rem;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--color-pill-text);
        box-shadow: var(--shadow-pill);
        border: 1px solid var(--color-border);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .pill:hover {
        border-color: var(--color-pill-border-hover);
        background: var(--color-pill-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-pill-hover);
      }

      /* =========================================
         9. Footer Note
         ========================================= */
      .footer-note {
        padding-top: 2rem;
        border-top: 1px solid var(--color-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--color-text-muted);
        transition:
          border-color 0.4s,
          color 0.4s;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--color-tag);
        padding: 0.4rem 0.8rem;
        border-radius: 8px;
        border: 1px solid var(--color-tag-border);
        transition:
          background-color 0.4s,
          border-color 0.4s;
      }

      .led-dot {
        width: 8px;
        height: 8px;
        background: var(--color-success);
        border-radius: 50%;
        animation: pulseDot 2s infinite;
        transition: background-color 0.4s;
      }

      .closing-text {
        font-size: 0.85rem;
        color: var(--color-footer-closing);
        transition: color 0.4s;
      }

      /* =========================================
         Responsive
         ========================================= */
      @media (max-width: 600px) {
        .greeting-content {
          padding: 3rem 1.5rem;
        }
        .project-headline {
          font-size: 2.8rem;
        }
        .footer-note {
          flex-direction: column;
          gap: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="welcome-panel">
      <!-- 顶部轻量级导航条 -->
      <header class="top-strip">
        <div class="logo-box">
          <img
            src="/sources/logo/logo.svg"
            alt="logo"
            onerror="
              this.style.display = 'none';
              this.parentNode.innerHTML = '🌱';
            "
          />
        </div>
        <span class="brand-name">GoSeed</span>
        <span class="strip-tag">简约 · 直接</span>

        <!-- 主题切换按钮 -->
        <button class="theme-btn" id="theme-toggle" title="切换主题">🌙</button>
      </header>

      <!-- 核心欢迎区域 -->
      <main class="greeting-content">
        <div class="welcome-message">
          <span>👋</span> 欢迎使用轻量级 API 系统
        </div>

        <h1 class="project-headline">GoSeed</h1>
        <p class="sub-desc">简洁 · 可靠 · 只关注核心逻辑</p>

        <!-- 特性标签 -->
        <div class="simple-desc">
          <span class="pill">⚡ 原生性能</span>
          <span class="pill">📦 即装即用</span>
          <span class="pill">🌈 极简设计</span>
        </div>

        <!-- 底部状态 -->
        <footer class="footer-note">
          <div class="status-badge">
            <span class="led-dot"></span>
            <span>服务运行中 · 一切就绪</span>
          </div>
          <div class="closing-text">—— 开始你的 GoSeed 之旅 ——</div>
        </footer>
      </main>
    </div>

    <!-- 主题切换的简单 JS 逻辑 -->
    <script>
      const themeToggleBtn = document.getElementById("theme-toggle");
      const htmlElement = document.documentElement;

      // 检测系统是否倾向于暗黑模式作为初始状态
      const prefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;
      if (prefersDark) {
        htmlElement.setAttribute("data-theme", "dark");
        themeToggleBtn.innerText = "☀️";
      }

      // 点击切换逻辑
      themeToggleBtn.addEventListener("click", () => {
        const currentTheme = htmlElement.getAttribute("data-theme");
        if (currentTheme === "dark") {
          htmlElement.removeAttribute("data-theme");
          themeToggleBtn.innerText = "🌙"; // 换成月亮图标
        } else {
          htmlElement.setAttribute("data-theme", "dark");
          themeToggleBtn.innerText = "☀️"; // 换成太阳图标
        }
      });
    </script>
  </body>
</html>
